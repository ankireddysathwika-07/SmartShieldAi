<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function() {
        var customFetch = window.fetch;
        function setupFetch(obj) {
          try {
            if (obj) {
              var desc = Object.getOwnPropertyDescriptor(obj, 'fetch');
              if (!desc || desc.configurable) {
                Object.defineProperty(obj, 'fetch', {
                  get: function() { return customFetch; },
                  set: function(val) { customFetch = val; },
                  configurable: true,
                  enumerable: true
                });
              }
            }
          } catch (e) {
            console.warn('Failed to patch fetch on:', obj, e);
          }
        }
        setupFetch(window);
        if (typeof globalThis !== 'undefined') setupFetch(globalThis);
        if (typeof self !== 'undefined') setupFetch(self);
        if (typeof global !== 'undefined') setupFetch(global);
      })();
    </script>
